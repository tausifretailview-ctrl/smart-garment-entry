<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>EzzyERP — Connection required</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #1e40af;
        color: #fff;
        text-align: center;
      }
      .card {
        max-width: 360px;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 16px;
        padding: 28px 22px;
      }
      h1 { font-size: 1.35rem; margin: 0 0 10px; font-weight: 800; }
      p { margin: 0 0 18px; line-height: 1.45; opacity: 0.95; font-size: 0.95rem; }
      button {
        appearance: none;
        border: 0;
        border-radius: 10px;
        background: #fff;
        color: #1e40af;
        font-weight: 700;
        font-size: 1rem;
        padding: 12px 20px;
        width: 100%;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Can't reach EzzyERP</h1>
      <p>
        Check your internet connection (Wi‑Fi or mobile data), then tap Retry.
        The app needs a network to open.
      </p>
      <button type="button" onclick="location.href='https://app.inventoryshop.in/'">Retry</button>
    </div>
  </body>
</html>
