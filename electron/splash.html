<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>EzzyERP</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: #1e40af;
    color: #ffffff;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    -webkit-user-select: none; user-select: none;
  }
  .wrap {
    height: 100%; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px; text-align: center;
  }
  .logo {
    width: 56px; height: 56px; border-radius: 12px;
    margin-bottom: 14px; object-fit: contain;
    background: rgba(255,255,255,0.08);
  }
  .brand { font-size: 28px; font-weight: 700; letter-spacing: 0.5px; }
  .tag { margin-top: 6px; font-size: 12px; opacity: 0.85; }
  .bar {
    margin-top: 22px; width: 220px; height: 4px;
    background: rgba(255,255,255,0.18); border-radius: 2px; overflow: hidden;
  }
  .bar::before {
    content: ''; display: block; width: 40%; height: 100%;
    background: #ffffff; border-radius: 2px;
    animation: slide 1.1s ease-in-out infinite;
  }
  @keyframes slide {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }
  .ver { position: absolute; bottom: 8px; right: 12px; font-size: 10px; opacity: 0.7; }
</style>
</head>
<body>
  <div class="wrap">
    <img class="logo" src="../build/icon.png" alt="" onerror="this.style.display='none'" />
    <div class="brand">EzzyERP</div>
    <div class="tag">Smart Inventory &amp; Billing</div>
    <div class="bar"></div>
  </div>
  <div class="ver" id="ver"></div>
  <script>
    // Version is injected via query string: splash.html?v=1.2.3
    try {
      const v = new URLSearchParams(location.search).get('v');
      if (v) document.getElementById('ver').textContent = 'v' + v;
    } catch {}
  </script>
</body>
</html>
